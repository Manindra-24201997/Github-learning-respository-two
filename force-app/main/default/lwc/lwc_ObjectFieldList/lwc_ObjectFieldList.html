<template>
    <lightning-card title="Job Field Info">
        <template if:true={fields}>
            <table class="slds-table slds-table_cell-buffer slds-table_bordered">
                <thead>
                    <tr>
                        <th>API Name</th>
                        <th>Label</th>
                        <th>Data Type</th>
                        <th>Required?</th>
                    </tr>
                </thead>
                <tbody>
                    <template for:each={fields} for:item="field">
                        <tr key={field.apiName}>
                            <td>{field.apiName}</td>
                            <td>{field.label}</td>
                            <td>{field.dataType}</td>
                            <td>
                                <lightning-icon 
                                    icon-name="utility:check"
                                    alternative-text="Required"
                                    size="x-small">
                                </lightning-icon>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </template>
        <template if:false={fields}>
            <p>Loading fields...</p>
        </template>
    </lightning-card>
</template>
